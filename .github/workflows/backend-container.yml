name: "Publish backend container to GHCR"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "src/backend/**"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - "src/backend/**"
  #     - ".github/workflows/backend-container.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"
  BACKEND_SOLUTION_PATH: "src/backend"
  BACKEND_SOLUTION_FILE: "Backend.slnx"
  API_PROJECT: "src/backend/WebApi/WebApi.csproj"

jobs:
  prepare-repository-name:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.lower-repo.outputs.repository }}
    steps:
      - id: lower-repo
        run: |
          echo "repository=${GITHUB_REPOSITORY@L}" >> $GITHUB_OUTPUT

  gitversion:
    needs: prepare-repository-name
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    uses: hwinther/reusable-workflows/.github/workflows/gitversion.yml@v1
    with:
      container_registry: ghcr.io
      container_image_name: ${{ needs.prepare-repository-name.outputs.repository }}/api

  build-and-push:
    name: Build and push (${{ needs.gitversion.outputs.version || needs.gitversion.outputs.git_version_semver || github.ref_name }})
    needs: [prepare-repository-name, gitversion]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    defaults:
      run:
        working-directory: ${{ env.BACKEND_SOLUTION_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "${{ env.BACKEND_SOLUTION_PATH }}/**/packages.lock.json"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore --locked-mode ${{ env.BACKEND_SOLUTION_FILE }}

      - name: Publish container to GHCR
        env:
          ContainerImageTags: ${{ needs.gitversion.outputs.image_tags }}
        run: |
          dotnet publish ${{ env.API_PROJECT }} \
            -c Release \
            --no-restore \
            -p:PublishProfile=DefaultContainer \
            -p:ContainerRegistry=ghcr.io \
            -p:ContainerRepository=${{ needs.prepare-repository-name.outputs.repository }}/api
