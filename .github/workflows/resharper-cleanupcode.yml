name: "ReSharper CleanupCode"
# To get rid of the noise from the cleanups - run the following in your clone of this repo:
# git config blame.ignoreRevsFile .git-blame-ignore-revs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "CleanupCode — run jb cleanupcode and open a PR. Blame ignore revs — after CleanupCode has merged to the default branch (squash/rebase), sync .git-blame-ignore-revs from that history and open a PR. Both runs CleanupCode then sync (sync still only sees SHAs already on the default branch)."
        type: choice
        default: cleanupcode
        options:
          - cleanupcode
          - blame-ignore-revs

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

jobs:
  cleanupcode:
    uses: hwinther/reusable-workflows/.github/workflows/resharper-cleanupcode.yml@v1
    permissions:
      contents: write
      pull-requests: write
    with:
      mode: ${{ github.event.inputs.mode }}
      solution_path: src/backend
      solution_name: Backend.slnx
      dotnet_version: 10.0.x
      commit_subject: "chore(backend): ReSharper CleanupCode"
