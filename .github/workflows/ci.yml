name: "Continuous Integration (PR build)"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, synchronize, ready_for_review]

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  pr-build:
    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: read
    uses: hwinther/reusable-workflows/.github/workflows/pr-build.yml@f72dbfff5f226a3fc3035daa2eb29dde3464582e # v1.62.0
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    secrets: inherit
    with:
      node_enabled: true
      node_working_directory: "src/frontend"
      dotnet_enabled: true
      dotnet_working_directory: "src/backend"
      dotnet_changes_regex: "^src/backend|^tests/backend"
      dotnet_solution_file: "Backend.slnx"
