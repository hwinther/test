name: "Continuous Integration (PR build)"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, synchronize, ready_for_review]

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  pr-build:
    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: read
    uses: hwinther/reusable-workflows/.github/workflows/pr-build.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    secrets:
      # pr-build.yml declares only these two (both required: false; each falls back
      # to GITHUB_TOKEN when unset). GITHUB_TOKEN is auto-provided, not forwarded.
      npm_auth_token: ${{ secrets.npm_auth_token }}
      nuget_auth_token: ${{ secrets.nuget_auth_token }}
    with:
      node_enabled: true
      node_working_directory: "src/frontend"
      dotnet_enabled: true
      dotnet_working_directory: "src/backend"
      dotnet_changes_regex: "^src/backend|^tests/backend"
      dotnet_solution_file: "Backend.slnx"
