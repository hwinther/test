name: "PR build, scan, and E2E"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types: [opened, reopened, labeled, synchronize, ready_for_review]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "tests/playwright/**"
      - "docker-compose.e2e.yml"
      - ".github/workflows/pr-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "tests/playwright/**"
      - "docker-compose.e2e.yml"
      - ".github/workflows/pr-e2e.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  api:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/build-and-scan-dotnet.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      dotnet_version: 10.0.x
      solution_path: src/backend
      solution_file: Backend.slnx
      project_file: WebApi/WebApi.csproj
      container_registry: ghcr.io
      container_image_name_postfix: api
      grype_fail_build: never # TODO: Reset once opentelemetry packages have been updated (matches api-container.yml)

  frontend:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
      actions: write
      security-events: write
      pull-requests: write
    uses: hwinther/reusable-workflows/.github/workflows/build-and-scan-docker.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      container_registry: ghcr.io
      container_image_name_postfix: frontend
      build_context: src/frontend
      dockerfile: src/frontend/Dockerfile
      grype_fail_build: never # TODO: Reset once node:24-alpine ships fix (matches frontend-container.yml)

  e2e:
    needs: [api, frontend]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      packages: read
      pull-requests: write
      # playwright-e2e.yml fetches the built image artifacts via `gh run download`
      # (Actions REST API), which requires actions: read on the workflow token.
      actions: read
    uses: hwinther/reusable-workflows/.github/workflows/playwright-e2e.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      compose_file: docker-compose.e2e.yml
      playwright_working_directory: tests/playwright
      playwright_cache_enabled: true
      # playwright.config.ts ships 5 browser projects; only run chromium in CI to match playwright_browsers default.
      playwright_run_command: "npx playwright test --project=chromium"
      image_artifacts_json: |
        {"API_IMAGE":"${{ needs.api.outputs.image_artifact }}",
         "FRONTEND_IMAGE":"${{ needs.frontend.outputs.image_artifact }}"}
