name: "Automatically update dotnet lockfiles in dependabot PRs"

on:
  pull_request_target:
    types:
      - labeled
      - synchronize

jobs:
  update-lockfiles:
    uses: hwinther/reusable-workflows/.github/workflows/dependabot-update-dotnet-lockfiles.yml@f72dbfff5f226a3fc3035daa2eb29dde3464582e # v1.62.0
    permissions:
      contents: read
    with:
      solution_path: src/backend
      solution_name: Backend.slnx
      dotnet_version: 10.0.x
    secrets:
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
