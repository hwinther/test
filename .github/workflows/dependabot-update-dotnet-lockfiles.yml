name: "Automatically update dotnet lockfiles in dependabot PRs"

on:
  pull_request_target:
    types:
      - labeled
      - synchronize

jobs:
  update-lockfiles:
    uses: hwinther/reusable-workflows/.github/workflows/dependabot-update-dotnet-lockfiles.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    permissions:
      contents: read
    with:
      solution_path: src/backend
      solution_name: Backend.slnx
      dotnet_version: 10.0.x
    secrets:
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
