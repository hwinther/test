name: "Automatically update terraform markdown files"

on:
  pull_request_target:
    paths: "templates/terraform/**"
  pull_request:
    paths: "templates/terraform/**"

env:
  TERRAFORM_PATH: "templates/terraform"

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Checkout ${{ github.head_ref }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.WORKFLOW_TOKEN }}

      - name: Setup git user
        env:
          GH_ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$GH_ACTOR"
          git config user.email "$GH_ACTOR@users.noreply.github.com"

      - name: Generate TF Docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          find-dir: ${{ env.TERRAFORM_PATH }}
          output-file: USAGE.md

      - name: Update branch
        run: |
          git status
          if output=$(git status --porcelain) && [ -z "$output" ]; then
            # Working directory clean - do nothing
            echo Working directory clean
            exit 0
          else 
            # Uncommitted changes
            echo Add and commit changes
            git commit -a -m "Update TF markdown"
            git push
          fi
