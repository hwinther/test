name: "Create tag and release"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Navn på tag (f.eks. v1.2.3)"
        required: false
        default: "auto"
      release_notes:
        description: "Utgivelsesnotater for denne taggen"
        required: false
      create_release:
        description: "Opprett en GitHub Release for denne taggen"
        required: false
        default: "true"
      container_grype_fail_build:
        description: "Fail container workflow if Grype finds vulnerabilities (turn off for a release override)"
        type: boolean
        default: true

jobs:
  tag:
    permissions:
      contents: write
      # Required so we can dispatch container workflows after tagging (tag push from GITHUB_TOKEN does not fire on.push.tags)
      actions: write
    uses: hwinther/reusable-workflows/.github/workflows/tag-and-release.yml@a0e722a6a3002b2095899c71861906262160b125 # v2.0.0
    with:
      tag_name: ${{ inputs.tag_name }}
      release_notes: ${{ inputs.release_notes }}
      create_release: ${{ inputs.create_release }}
    secrets: inherit

  # GitHub does not run tag-push workflows when the tag was created with GITHUB_TOKEN; dispatch the same jobs explicitly.
  trigger-container-builds:
    needs: tag
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine ref for container builds
        id: ref
        run: |
          git fetch --tags --force
          TAG="${{ inputs.tag_name }}"
          if [ "$TAG" = "auto" ] || [ -z "$TAG" ]; then
            REF=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          else
            REF="$TAG"
          fi
          if [ -z "$REF" ]; then
            echo "::error::Could not resolve a tag ref for container builds."
            exit 1
          fi
          echo "Using ref: $REF"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Dispatch API container workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run api-container.yml --ref "${{ steps.ref.outputs.ref }}" -f grype_fail_build=${{ inputs.container_grype_fail_build }}

      - name: Dispatch frontend container workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run frontend-container.yml --ref "${{ steps.ref.outputs.ref }}" -f grype_fail_build=${{ inputs.container_grype_fail_build }}
