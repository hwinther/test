name: "Publish api container to GHCR"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "src/backend/**"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - "src/backend/**"
  #     - ".github/workflows/backend-container.yml"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  dotnet_container:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      actions: write
      security-events: write
    uses: hwinther/reusable-workflows/.github/workflows/dotnet-container.yml@v1
    with:
      dotnet_version: 10.0.x
      solution_path: src/backend
      solution_file: Backend.slnx
      project_file: WebApi/WebApi.csproj
      container_registry: ghcr.io
      container_image_name_postfix: api
      grype_fail_build: false # TODO: Reset this after opentelemetry packages have been updated
